name: CD

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # -----------------------------------------------------------
  # Job 1 — Run the same checks as CI before deploying
  # -----------------------------------------------------------
  test:
    name: Tests + Lint + Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: restaurante_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/restaurante_test
      REDIS_URL: redis://localhost:6379/0
      DJANGO_ENV: test
      SECRET_KEY: ci-secret-key-not-for-production
      DJANGO_SETTINGS_MODULE: config.settings_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt

      - name: Run ruff lint
        run: |
          cd apps/api
          python -m ruff check .

      - name: Run migrations
        run: |
          cd apps/api
          python manage.py migrate --no-input

      - name: Run backend tests
        run: |
          cd apps/api
          python -m pytest --tb=short -q

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  # -----------------------------------------------------------
  # Job 2 — Deploy backend API (Easypanel)
  # -----------------------------------------------------------
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Trigger Easypanel redeploy — restaurante
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.EASYPANEL_URL }}/api/trpc/services.redeploy" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.EASYPANEL_API_KEY }}" \
            -d '{"projectName":"projetos","serviceName":"restaurante"}')
          echo "Easypanel responded with HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Easypanel redeploy failed with status $HTTP_STATUS"
            exit 1
          fi

      - name: Wait for backend to come up
        run: sleep 60

  # -----------------------------------------------------------
  # Job 3 — Deploy frontend (Easypanel, parallel with backend)
  # -----------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Trigger Easypanel redeploy — restaurante-frontend
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.EASYPANEL_URL }}/api/trpc/services.redeploy" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.EASYPANEL_API_KEY }}" \
            -d '{"projectName":"projetos","serviceName":"restaurante-frontend"}')
          echo "Easypanel responded with HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Easypanel redeploy failed with status $HTTP_STATUS"
            exit 1
          fi

      - name: Wait for frontend to come up
        run: sleep 60

  # -----------------------------------------------------------
  # Job 4 — Deploy worker + beat (depends on backend for migrations)
  # -----------------------------------------------------------
  deploy-workers:
    name: Deploy Workers
    runs-on: ubuntu-latest
    needs: [deploy-backend]

    strategy:
      matrix:
        service: [restaurante-worker, restaurante-beat]

    steps:
      - name: Trigger Easypanel redeploy — ${{ matrix.service }}
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.EASYPANEL_URL }}/api/trpc/services.redeploy" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.EASYPANEL_API_KEY }}" \
            -d '{"projectName":"projetos","serviceName":"${{ matrix.service }}"}')
          echo "Easypanel responded with HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Easypanel redeploy failed with status $HTTP_STATUS"
            exit 1
          fi

      - name: Wait for service to come up
        run: sleep 30

  # -----------------------------------------------------------
  # Job 5 — Smoke tests after all deploys
  # -----------------------------------------------------------
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend, deploy-workers]

    steps:
      - name: Check API health
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/health.json -w "%{http_code}" \
            --max-time 15 --retry 3 --retry-delay 10 \
            "https://api.mesamestre.com.br/api/v1/health/")
          echo "API health: HTTP $HTTP_STATUS"
          cat /tmp/health.json || true
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::API health check failed with status $HTTP_STATUS"
            exit 1
          fi

      - name: Check frontend
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 --retry 3 --retry-delay 10 \
            "https://app.mesamestre.com.br/")
          echo "Frontend: HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Frontend health check failed with status $HTTP_STATUS"
            exit 1
          fi

      - name: Comment on commit if smoke test fails
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: '## Deploy Smoke Test Failed\n\nThe smoke test after deploy failed. Check the [workflow run](' +
                `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}` +
                ') for details.\n\nServices may need manual intervention via Easypanel.'
            })
